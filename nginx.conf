# Nginx 反向代理配置
# 用法: 将文件复制到 /etc/nginx/sites-available/ai-writer
#       然后 ln -s /etc/nginx/sites-available/ai-writer /etc/nginx/sites-enabled/
#       最后 nginx -t && systemctl restart nginx

server {
    listen 80;
    server_name 你的域名或服务器IP;

    # 字符集
    charset utf-8;

    # 代理到本地 Next.js 服务
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket 支持（SSE 流式响应需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI 流式输出需要长时间不超时
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # 禁用缓冲，让 SSE 流实时输出
        proxy_buffering off;
        proxy_cache off;
    }

    # 静态资源缓存
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # 日志
    access_log /var/log/nginx/ai-writer-access.log;
    error_log  /var/log/nginx/ai-writer-error.log;
}
